<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="网页 UI 动效科普与提示词灵感库。收集常用的基础与常用网页动效，提供双语名称、直观动效演示及一键复制 AI 提示词，专为初学者设计。">
  <title>网页 UI 动效灵感库 | Web Motion Showcase</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- Reading this as: educational showcase landing page for beginner web designers and developers, with a clean, low-density, Apple-y minimalist language, leaning toward native CSS/JS + scroll-driven animations + clean cards. -->

  <!-- Top Progress Bar -->
  <div class="scroll-progress" aria-hidden="true">
    <div class="scroll-progress-bar" id="progressBar"></div>
  </div>

  <!-- Header -->
  <header class="navbar" id="navbar">
    <div class="container navbar-inner">
      <a href="#" class="brand">
        <span class="brand-logo" aria-hidden="true">✸</span>
        <span class="brand-text">Motion Hub</span>
      </a>
      <nav class="nav-links" aria-label="主要导航">
        <a href="#gallery" class="nav-item active">探索动效</a>
        <a href="https://github.com/holynova/web-motion-showcase" target="_blank" rel="noopener" class="nav-item">开源仓库</a>
      </nav>
      <div class="theme-selector-container">
        <div class="theme-options" role="radiogroup" aria-label="选择色彩主题">
          <button class="theme-dot" data-theme-opt="slate" type="button" aria-label="石板灰主题" title="石板灰主题" style="--dot-color: #3b82f6;"></button>
          <button class="theme-dot" data-theme-opt="green" type="button" aria-label="莫兰迪绿主题" title="莫兰迪绿主题" style="--dot-color: #387a4b;"></button>
          <button class="theme-dot" data-theme-opt="sand" type="button" aria-label="秋叶暖沙主题" title="秋叶暖沙主题" style="--dot-color: #b86d3b;"></button>
        </div>
        <button class="theme-mode-btn" id="modeToggle" type="button" aria-label="切换深浅模式" title="切换深/浅色模式">
          <span class="mode-icon" aria-hidden="true">☼</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- Hero Section -->
    <section class="hero-section">
      <div class="container">
        <div class="hero-content">
          <h1 class="hero-title">克制的网页动效灵感</h1>
          <p class="hero-subtitle">科普常用网页动效，提供直观预览与一键复制的 AI 开发提示词。</p>
        </div>
      </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section" id="gallery" aria-labelledby="gallery-heading">
      <div class="container">
        <!-- Section Header (Stacked and vertical per design-taste rules, avoiding BANNED split-header layout) -->
        <div class="section-header">
          <h2 id="gallery-heading" class="section-title">常用动效模式</h2>
          <p class="section-description">精选 8 个适合初学者的经典网页动画，点击可复制其专属的 AI 生成提示词。</p>
        </div>

        <!-- Toolbar (Search & Filter) -->
        <div class="gallery-toolbar">
          <div class="search-wrapper">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input type="search" id="searchInput" placeholder="搜索动效名称或描述..." aria-label="搜索动效">
          </div>
          <div class="filter-tags" id="filterContainer" role="tablist" aria-label="动效分类">
            <!-- Dynamically populated categories -->
          </div>
        </div>

        <!-- Grid Container -->
        <div class="motion-grid" id="motionGrid" aria-live="polite">
          <!-- Dynamically populated motion cards -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
          <div class="empty-state-icon" aria-hidden="true">✦</div>
          <h3>未找到匹配的动效</h3>
          <p>请尝试搜索其他关键词，或者切换分类标签。</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <p class="footer-copyright">&copy; 2026 Motion Hub. Designed for beginners.</p>
      <p class="footer-note">动效应当服务于信息传递，克制才是最高级的设计。</p>
    </div>
  </footer>

  <!-- Notification Toast -->
  <div class="toast-notification" id="toastNotification" role="status" aria-live="polite">
    <span class="toast-icon" aria-hidden="true">✓</span>
    <span class="toast-message">提示词已复制到剪贴板！</span>
  </div>

  <script src="./script.js"></script>
</body>
</html>
