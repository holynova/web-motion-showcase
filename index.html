<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="网页 UI 动效科普与提示词灵感库。收集常用的基础与常用网页动效，提供双语名称、直观动效演示及一键复制 AI 提示词，专为初学者设计。">
  <title>网页 UI 动效灵感库 | Web Motion Showcase</title>
  <link rel="stylesheet" href="./styles.css?v=1.0.3">
</head>
<body>
  <!-- Reading this as: educational showcase landing page for beginner web designers and developers, with a clean, low-density, Apple-y minimalist language, leaning toward native CSS/JS + scroll-driven animations + clean cards. -->

  <!-- Top Progress Bar -->
  <div class="scroll-progress" aria-hidden="true">
    <div class="scroll-progress-bar" id="progressBar"></div>
  </div>

  <!-- Header -->
  <header class="navbar" id="navbar">
    <div class="container navbar-inner">
      <a href="#" class="brand">
        <span class="brand-logo" aria-hidden="true"><svg class="icon icon-brand" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9Z"></path></svg></span>
        <span class="brand-text">Motion Hub</span>
      </a>
      <nav class="nav-links" aria-label="主要导航">
        <a href="#gallery" class="nav-item active">探索动效</a>
        <a href="https://github.com/holynova/web-motion-showcase" target="_blank" rel="noopener" class="nav-item">开源仓库</a>
      </nav>
      <div class="nav-actions">
        <div class="theme-selector-container">
          <div class="theme-options" role="radiogroup" aria-label="选择色彩主题">
            <button class="theme-dot" data-theme-opt="slate" type="button" aria-label="石板灰主题" title="石板灰主题" style="--dot-color: #3b82f6;"></button>
            <button class="theme-dot" data-theme-opt="green" type="button" aria-label="莫兰迪绿主题" title="莫兰迪绿主题" style="--dot-color: #387a4b;"></button>
            <button class="theme-dot" data-theme-opt="sand" type="button" aria-label="秋叶暖沙主题" title="秋叶暖沙主题" style="--dot-color: #b86d3b;"></button>
          </div>
          <button class="theme-mode-btn" id="modeToggle" type="button" aria-label="切换深浅模式" title="切换深/浅色模式">
            <span class="mode-icon" aria-hidden="true"><svg class="icon icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></span>
          </button>
        </div>
        <div class="lang-selector-container">
          <button class="lang-btn active" data-lang-opt="zh" type="button" aria-label="中文" title="切换为中文">中</button>
          <button class="lang-btn" data-lang-opt="en" type="button" aria-label="English" title="Switch to English">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- Hero Section -->
    <section class="hero-section">
      <div class="container">
        <div class="hero-content">
          <h1 class="hero-title">克制的网页动效灵感</h1>
          <p class="hero-subtitle">已收录 <span id="totalMotionsCount" style="font-weight: 700; color: var(--accent-color);">--</span> 种经典与现代网页动效，提供一键复制的 AI 开发提示词。</p>
        </div>
      </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section" id="gallery" aria-label="动效展示网格">
      <div class="container">

        <!-- Toolbar (Search & Filter) -->
        <div class="gallery-toolbar">
          <div class="search-wrapper">
            <span class="search-icon" aria-hidden="true"><svg class="icon icon-search" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>
            <input type="search" id="searchInput" placeholder="搜索动效名称或描述..." aria-label="搜索动效">
          </div>
          <div class="filter-tags" id="filterContainer" role="tablist" aria-label="动效分类">
            <!-- Dynamically populated categories -->
          </div>
        </div>

        <!-- Grid Container -->
        <div class="motion-grid" id="motionGrid" aria-live="polite">
          <!-- Dynamically populated motion cards -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
          <div class="empty-state-icon" aria-hidden="true"><svg class="icon icon-empty" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9Z"></path></svg></div>
          <h3>未找到匹配的动效</h3>
          <p>请尝试搜索其他关键词，或者切换分类标签。</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <p class="footer-copyright">&copy; 2026 Motion Hub. Designed for beginners.</p>
      <p class="footer-note">动效应当服务于信息传递，克制才是最高级的设计。</p>
    </div>
  </footer>

  <!-- Notification Toast -->
  <div class="toast-notification" id="toastNotification" role="status" aria-live="polite">
    <span class="toast-icon" aria-hidden="true"><svg class="icon icon-check" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
    <span class="toast-message">提示词已复制到剪贴板！</span>
  </div>

  <script src="./script.js?v=1.0.3"></script>
</body>
</html>
